apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ittrap-root
spec:
  project: default
  sources:
    - repoURL: https://github.com/Kot-Zakhar/item_tracking_app_backend.git
      targetRevision: master
      path: deployment/argocd/apps/shared
      directory:
        recurse: true
    - repoURL: https://github.com/Kot-Zakhar/item_tracking_app_backend.git
      targetRevision: master
      path: deployment/argocd/apps/dev
      directory:
        recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

