apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "9"
spec:
  project: default

  source:
    repoURL: https://github.com/Kot-Zakhar/item_tracking_app_backend.git
    targetRevision: master
    path: deployment/argocd/manifests/postgres
    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: postgres

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
