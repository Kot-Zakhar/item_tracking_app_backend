apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ittrap-mongo
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: ittrap-mongo
spec:
  serviceName: ittrap-mongo-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ittrap-mongo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ittrap-mongo
    spec:
      containers:
      - name: ittrap-mongo
        image: mongo:8
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "300m"
        ports:
        - containerPort: 27017
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - mongosh --username $(cat /secrets/mongo-initdb-root-username) --password $(cat /secrets/mongo-initdb-root-password) --eval "db.adminCommand('ping')"
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 5
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - mongosh --username $(cat /secrets/mongo-initdb-root-username) --password $(cat /secrets/mongo-initdb-root-password) --eval "db.adminCommand('ping')"
          initialDelaySeconds: 20
          periodSeconds: 10
          failureThreshold: 3
        env:
        - name: MONGO_INITDB_ROOT_USERNAME_FILE
          value: "/secrets/mongo-initdb-root-username"
        - name: MONGO_INITDB_ROOT_PASSWORD_FILE
          value: "/secrets/mongo-initdb-root-password"
        - name: MONGO_INITDB_DATABASE
          value: mongo
        volumeMounts:
        - name: mongo-credentials
          mountPath: /secrets
          readOnly: true
        - name: mongo-data
          mountPath: /data/db
      volumes:
      - name: mongo-credentials
        secret:
          secretName: mongo-config
  volumeClaimTemplates:
  - metadata:
      name: mongo-data
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
