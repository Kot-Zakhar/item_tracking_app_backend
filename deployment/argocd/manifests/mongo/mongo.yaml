apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ittrap-mongo-data
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: ittrap-mongo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ittrap-mongo
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: ittrap-mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ittrap-mongo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ittrap-mongo
    spec:
      containers:
      - name: ittrap-mongo
        image: mongo:8
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "300m"
        ports:
        - containerPort: 27017
        env:
        - name: MONGO_INITDB_ROOT_USERNAME_FILE
          value: "/secrets/mongo-initdb-root-username"
        - name: MONGO_INITDB_ROOT_PASSWORD_FILE
          value: "/secrets/mongo-initdb-root-password"
        - name: MONGO_INITDB_DATABASE
          value: mongo
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - mongosh --username $(cat /secrets/mongo-initdb-root-username) --password $(cat /secrets/mongo-initdb-root-password) --eval "db.adminCommand('ping')"
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - mongosh --username $(cat /secrets/mongo-initdb-root-username) --password $(cat /secrets/mongo-initdb-root-password) --eval "db.adminCommand('ping')"
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: mongo-credentials
          mountPath: /secrets
          readOnly: true
        - name: mongo-data
          mountPath: /data/db
      volumes:
      - name: mongo-credentials
        secret:
          secretName: mongo-config
      - name: mongo-data
        persistentVolumeClaim:
          claimName: ittrap-mongo-data
