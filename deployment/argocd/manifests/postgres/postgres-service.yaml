apiVersion: v1
kind: Service
metadata:
  name: ittrap-postgres-headless
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: ittrap-postgres
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: ittrap-postgres
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: ittrap-postgres
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: ittrap-postgres
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ittrap-postgres
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: ittrap-postgres-nodeport
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: ittrap-postgres
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: ittrap-postgres
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
    nodePort: 30432
