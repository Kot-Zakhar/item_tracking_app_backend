apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ittrap-postgres-data
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: ittrap-postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ittrap-postgres
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: ittrap-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ittrap-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ittrap-postgres
    spec:
      containers:
      - name: ittrap-postgres
        image: postgres:16
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "300m"
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER_FILE
          value: "/secrets/postgres-user"
        - name: POSTGRES_PASSWORD_FILE
          value: "/secrets/postgres-password"
        - name: POSTGRES_DB_FILE
          value: "/secrets/postgres-database"
        # Ensures the DB initializes under a subdir (avoids "lost+found" issues on some volumes)
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        livenessProbe:
          exec:
            command:
            - pg_isready
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - pg_isready
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: postgres-credentials
          mountPath: /secrets
          readOnly: true
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-credentials
        secret:
          secretName: postgres-config
      - name: postgres-data
        persistentVolumeClaim:
          claimName: ittrap-postgres-data
