apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-vault-auth
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-store
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "kv"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "postgres-eso"
          serviceAccountRef:
            name: eso-vault-auth
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-config
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault-store
    kind: SecretStore
  target:
    name: postgres-config
    creationPolicy: Owner
  data:
    - secretKey: postgres-user
      remoteRef:
        key: postgres
        property: postgres-user
    - secretKey: postgres-password
      remoteRef:
        key: postgres
        property: postgres-password
    - secretKey: postgres-database
      remoteRef:
        key: postgres
        property: postgres-database
