{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ittrap-api-gateway
  namespace: {{ .Values.global.namespace }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if and .Values.global.domain (ne .Values.global.domain "localhost") }}
  rules:
    - host: {{ .Values.global.domain | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ittrap-api-gateway
                port:
                  number: 80
  {{- else }}
  defaultBackend:
    service:
      name: ittrap-api-gateway
      port:
        number: 80
  {{- end }}
{{- end }}

