apiVersion: v1
kind: ServiceAccount
metadata:
  name: ittrap-inventory-service
  namespace: {{ .Values.global.namespace }}
  {{- if and .Values.aws.irsa.enabled .Values.aws.irsa.roleArn }}
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.aws.irsa.roleArn | quote }}
  {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ittrap-inventory-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: ittrap
    app.kubernetes.io/component: inventory-service
spec:
  replicas: {{ .Values.services.inventoryService.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: ittrap
      app.kubernetes.io/component: inventory-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ittrap
        app.kubernetes.io/component: inventory-service
    spec:
      serviceAccountName: ittrap-inventory-service
      containers:
        - name: ittrap-inventory-service
          image: "{{ .Values.global.containerRegistry }}/{{ .Values.services.inventoryService.image.containerName }}:{{ .Values.services.inventoryService.image.tag }}"
          imagePullPolicy: {{ .Values.global.pullPolicy }}
          ports:
            - containerPort: 80
            - containerPort: 81
          env:
            - name: HTTP_PORT
              value: "80"
            - name: GRPC_PORT
              value: "81"
            - name: AWS_DEFAULT_REGION
              valueFrom:
                secretKeyRef:
                  name: aws-account-info
                  key: region
            - name: AWS_ACCOUNT_ID
              valueFrom:
                secretKeyRef:
                  name: aws-account-info
                  key: account-id
            - name: ConnectionStrings__PostgreSqlConnection
              valueFrom:
                secretKeyRef:
                  name: inventory-service-config
                  key: postgreSqlConnectionString
            - name: ConnectionStrings__MongoDbConnection
              valueFrom:
                secretKeyRef:
                  name: inventory-service-config
                  key: mongoDbConnectionString
            - name: GlobalConfig__Domain
              valueFrom:
                configMapKeyRef:
                  name: global-config
                  key: domain
            - name: GlobalConfig__JwtPrivateKey
              valueFrom:
                secretKeyRef:
                  name: global-config
                  key: jwt-private-key
            - name: GlobalConfig__MediatrLicenseKey
              valueFrom:
                secretKeyRef:
                  name: global-config
                  key: mediatr-license-key
            - name: GlobalConfig__OutboundSnsTopicArn
              value: {{ include "ittrap.snsTopicArn" (dict "global" .Values "topicName" .Values.aws.sns.itemEventsTopic) | quote }}
            - name: AWS__Region
              valueFrom:
                secretKeyRef:
                  name: aws-account-info
                  key: region
            - name: AWS__ServiceURL
              valueFrom:
                configMapKeyRef:
                  name: global-config
                  key: aws-service-url
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: secret-access-key
          resources:
{{ toYaml .Values.services.inventoryService.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: ittrap-inventory-service
  namespace: {{ .Values.global.namespace }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ittrap
    app.kubernetes.io/component: inventory-service
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: grpc
      port: 81
      targetPort: 81
