apiVersion: v1
kind: ServiceAccount
metadata:
  name: ittrap-identity-service
  namespace: {{ .Values.global.namespace }}
  {{- if and .Values.aws.irsa.enabled .Values.aws.irsa.roleArn }}
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.aws.irsa.roleArn | quote }}
  {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ittrap-identity-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: ittrap
    app.kubernetes.io/component: identity-service
spec:
  replicas: {{ .Values.services.identityService.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: ittrap
      app.kubernetes.io/component: identity-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ittrap
        app.kubernetes.io/component: identity-service
    spec:
      serviceAccountName: ittrap-identity-service
      containers:
        - name: ittrap-identity-service
          image: "{{ .Values.global.containerRegistry }}/{{ .Values.services.identityService.image.containerName }}:{{ .Values.services.identityService.image.tag }}"
          imagePullPolicy: {{ .Values.global.pullPolicy }}
          ports:
            - containerPort: 80
          env:
            - name: ASPNETCORE_HTTP_PORTS
              value: "80"
            - name: Logging__LogLevel__Default
              value: Debug
            - name: AWS_DEFAULT_REGION
              valueFrom:
                secretKeyRef:
                  name: aws-account-info
                  key: region
            - name: AWS_ACCOUNT_ID
              valueFrom:
                secretKeyRef:
                  name: aws-account-info
                  key: account-id
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: identity-service-config
                  key: postgreSqlConnectionString
            - name: GlobalConfig__PasswordPepper
              valueFrom:
                secretKeyRef:
                  name: identity-service-config
                  key: passwordPepper
            - name: GlobalConfig__Domain
              valueFrom:
                configMapKeyRef:
                  name: global-config
                  key: domain
            - name: GlobalConfig__JwtPrivateKey
              valueFrom:
                secretKeyRef:
                  name: global-config
                  key: jwt-private-key
            - name: GlobalConfig__MediatrLicenseKey
              valueFrom:
                secretKeyRef:
                  name: global-config
                  key: mediatr-license-key
            - name: GlobalConfig__SqsUrl
              value: {{ include "ittrap.sqsQueueUrl" (dict "global" .Values "queueName" .Values.aws.sqs.authQueue) | quote }}
            - name: GlobalConfig__OutboundSnsTopicArn
              value: {{ include "ittrap.snsTopicArn" (dict "global" .Values "topicName" .Values.aws.sns.authEventsTopic) | quote }}
            - name: GlobalConfig__EmailServerAddress
              valueFrom:
                configMapKeyRef:
                  name: identity-service-config
                  key: email-server-address
            - name: AWS__Region
              valueFrom:
                secretKeyRef:
                  name: aws-account-info
                  key: region
            - name: AWS__ServiceURL
              valueFrom:
                configMapKeyRef:
                  name: global-config
                  key: aws-service-url
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: secret-access-key
          resources:
{{ toYaml .Values.services.identityService.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: ittrap-identity-service
  namespace: {{ .Values.global.namespace }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ittrap
    app.kubernetes.io/component: identity-service
  ports:
    - name: http
      port: 80
      targetPort: 80
