{{- if .Values.aws.serviceUrl }}
# LocalStack — fake account ID is safe to create directly
apiVersion: v1
kind: Secret
metadata:
  name: aws-account-info
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/managed-by: helm
type: Opaque
stringData:
  account-id: "000000000000"
  region: {{ .Values.aws.region | quote }}
{{- end }}
{{- /* In real AWS envs, Terraform creates this secret */ -}}