apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ittrap-ingress
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # Identity service
          - path: /api/auth(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: ittrap-identity-service
                port:
                  number: 80

          # Query service (CQRS read side) - must come before the
          # broader /api/v1/items, /api/v1/locations, /api/v1/users rules
          - path: /api/v1/query(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: ittrap-query-service
                port:
                  number: 80

          # Management service
          - path: /api/v1/management(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: ittrap-management-service
                port:
                  number: 80

          # Inventory service (categories, files, items)
          - path: /api/v1/categories(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: ittrap-inventory-service
                port:
                  number: 80
          - path: /api/v1/files(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: ittrap-inventory-service
                port:
                  number: 80
          - path: /api/v1/items(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: ittrap-inventory-service
                port:
                  number: 80

          # Location service
          - path: /api/v1/locations(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: ittrap-location-service
                port:
                  number: 80

          # User service
          - path: /api/v1/users(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: ittrap-user-service
                port:
                  number: 80
