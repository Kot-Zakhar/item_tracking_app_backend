name: Running Tests

on:
  push:
    branches:
      - master
    paths:
      - 'src/**'
  pull_request:

jobs:

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_tests: ${{ steps.set-matrix.outputs.has_tests }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine changed test projects
        id: set-matrix
        run: |
          # Hardcoded list of source projects (under src/) with dependency flags.
          # Set "depends_on_shared" to true if the service references ItTrAp.Shared.
          SERVICES='[
            {"name":"ItTrAp.Shared","depends_on_shared":false},
            {"name":"ItTrAp.UserService","depends_on_shared":true},
            {"name":"ItTrAp.IdentityService","depends_on_shared":false},
            {"name":"ItTrAp.EmailService","depends_on_shared":false},
            {"name":"ItTrAp.QueryService","depends_on_shared":false},
            {"name":"ItTrAp.InventoryService","depends_on_shared":false},
            {"name":"ItTrAp.LocationService","depends_on_shared":false},
            {"name":"ItTrAp.ManagementService","depends_on_shared":false}
          ]'

          # Discover test projects at runtime from src/test/
          TEST_PROJECTS=$(find src/test -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort)
          echo "Discovered test projects:"
          echo "$TEST_PROJECTS"

          # Determine changed files
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }})
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          MATCHED='[]'

          # Check if the shared library source changed
          SHARED_CHANGED=false
          if echo "$CHANGED_FILES" | grep -q "^src/ItTrAp.Shared/"; then
            SHARED_CHANGED=true
          fi

          # For each discovered test project, decide whether to include it
          for test_proj in $TEST_PROJECTS; do
            include=false

            # 1. Include if the test project itself changed
            if echo "$CHANGED_FILES" | grep -q "^src/test/${test_proj}/"; then
              include=true
            fi

            # 2. Match test project to its parent service by name prefix.
            #    e.g. ItTrAp.UserService.Test           -> ItTrAp.UserService
            #         ItTrAp.UserService.Integration.Test -> ItTrAp.UserService
            #         ItTrAp.Shared.Test                 -> ItTrAp.Shared
            for svc_row in $(echo "$SERVICES" | jq -c '.[]'); do
              svc=$(echo "$svc_row" | jq -r '.name')

              if [[ "$test_proj" == "${svc}."* ]]; then
                # Include if the parent service source changed
                if echo "$CHANGED_FILES" | grep -q "^src/${svc}/"; then
                  include=true
                fi

                # Include if shared changed and this service depends on shared
                depends_on_shared=$(echo "$svc_row" | jq -r '.depends_on_shared')
                if [[ "$SHARED_CHANGED" == "true" && "$depends_on_shared" == "true" ]]; then
                  include=true
                fi
              fi
            done

            if [[ "$include" == "true" ]]; then
              entry=$(jq -n --arg test "$test_proj" '{"test":$test}')
              MATCHED=$(echo "$MATCHED" | jq -c ". + [$entry]")
            fi
          done

          COUNT=$(echo "$MATCHED" | jq length)
          echo "Detected $COUNT test project(s) to run"

          if [[ "$COUNT" -gt 0 ]]; then
            echo "matrix={\"include\":$(echo "$MATCHED" | jq -c .)}" >> "$GITHUB_OUTPUT"
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
          fi

  run-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_tests == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore src/test/${{ matrix.test }}/${{ matrix.test }}.csproj

      - name: Build test project
        run: dotnet build src/test/${{ matrix.test }}/${{ matrix.test }}.csproj --no-restore --configuration Release

      - name: Run tests
        run: |
          dotnet test src/test/${{ matrix.test }}/${{ matrix.test }}.csproj \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=results.trx" \
            --logger "console;verbosity=detailed" \
            --results-directory ./test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.test }}
          path: ./test-results/*.trx

  block-pr:
    needs: run-tests
    if: always() && github.event_name == 'pull_request' && needs.run-tests.result == 'failure'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Mark PR as needing work
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;

            // Add a "needs work" label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: ['needs work']
            });

            // Post a comment explaining the failure
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: '❌ **Tests failed.** This PR has been marked as `needs work`. Please check the [test results](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ') and fix the failing tests before merging.'
            });

            // Request changes via a review
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              event: 'REQUEST_CHANGES',
              body: 'Automated review: tests are failing. Please fix them before this PR can be merged.'
            });

  unblock-pr:
    needs: run-tests
    if: always() && github.event_name == 'pull_request' && needs.run-tests.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Remove needs-work label and approve
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;

            // Remove the "needs work" label if present
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                name: 'needs work'
              });
            } catch (e) {
              // Label may not exist on this PR – ignore
              if (e.status !== 404) throw e;
            }

            // Dismiss any outstanding REQUEST_CHANGES reviews left by this bot
            const reviews = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            for (const review of reviews.data) {
              if (review.state === 'CHANGES_REQUESTED' && review.user.login === 'github-actions[bot]') {
                await github.rest.pulls.dismissReview({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  review_id: review.id,
                  message: 'Tests are now passing. Dismissing previous request for changes.'
                });
              }
            }

            // Post a success comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: '✅ **All tests passed.** The `needs work` block has been removed. This PR is ready for review.'
            });